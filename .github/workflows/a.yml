name: Grok 批量注册 (Windows)

# ──────────────────────────────────────────────────────────────
# 公开仓库入口：拉取私有仓库 xbox-cn/grok-reg-test 的代码执行
# 前提：在公开仓库 Settings → Secrets and variables → Actions
#       添加 Secret: PRIVATE_REPO_TOKEN = 你的 github_pat_ 开头的 token
# 触发方式：
#   1) 手动：Actions → 选本 workflow → 填参数 → Run workflow
#   2) 定时：取消下方 cron 注释即每天定时自动跑
# ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      runners:
        description: "并行 runner 数量（每台机器独立并发，直接输入数字）"
        required: true
        default: "2"
        type: string
      count_per_runner:
        description: "每个 runner 注册账号数量"
        required: true
        default: "5"
        type: string
      check_alive:
        description: "是否测活（关闭则只注册+打包，不测活不上传CPA）"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
  # schedule:
  #   - cron: "0 8 * * *"

# 私有源仓库（代码从这里拉，凭据用 PRIVATE_REPO_TOKEN）
env:
  SOURCE_REPO: "xbox-cn/grok-reg-test"

jobs:
  # ── Job 1：根据输入的 runner 数量生成并发索引矩阵 ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      total: ${{ steps.gen.outputs.total }}
    steps:
      - id: gen
        shell: bash
        run: |
          N="${{ github.event.inputs.runners || '2' }}"
          IDX=""
          for i in $(seq 1 "$N"); do
            [ -n "$IDX" ] && IDX="$IDX,"
            IDX="$IDX\"$i\""
          done
          echo "matrix=[$IDX]" >> "$GITHUB_OUTPUT"
          echo "total=$N" >> "$GITHUB_OUTPUT"

  # ── Job 2：每个索引在一台 windows 机器上跑注册 ──
  register:
    needs: prepare
    name: Runner ${{ matrix.index }} / 共 ${{ needs.prepare.outputs.total }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        index: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: 检出私有源仓库代码
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 确认 Chrome 可用
        shell: pwsh
        run: |
          $paths = @(
            "${env:ProgramFiles}\Google\Chrome\Application\chrome.exe",
            "${env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) { Write-Host "Chrome: $p"; & $p --version; $found = $true; break }
          }
          if (-not $found) { Write-Host "[!] 未找到 Chrome" }

      - name: 写入 CI 配置
        shell: pwsh
        run: |
          if (Test-Path "gh\ci_config.json") {
            Copy-Item "gh\ci_config.json" "config.json" -Force
            Write-Host "已写入 gh/ci_config.json -> config.json"
          } else {
            Write-Host "[!] 未找到 gh/ci_config.json，使用仓库内 config.json"
          }

      - name: 运行注册（非交互模式）
        env:
          CI: "true"
          GROK_REG_CI: "true"
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        shell: pwsh
        run: |
          $count = "${{ github.event.inputs.count_per_runner || '5' }}"
          Write-Host "===== Runner ${{ matrix.index }} 开始注册：目标 $count 个 ====="
          python grok_register_ttk.py --ci --count $count

      - name: 上传账号文件（artifact）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accounts-runner-${{ matrix.index }}
          path: |
            accounts.txt
            mail_credentials.txt
          if-no-files-found: ignore
          retention-days: 7

  # ── Job 3：收集所有 runner 的账号，合并去重 → 测活 → 存活上传 CPA ──
  collect:
    needs: register
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 检出私有源仓库代码（含 check_alive.py）
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 下载所有 runner 的 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: accounts-runner-*
          path: all_runners
          merge-multiple: false

      - name: 合并所有账号文件
        shell: bash
        run: |
          mkdir -p merged
          : > merged/all_accounts.txt
          total=0
          for d in all_runners/accounts-runner-*/; do
            [ -d "$d" ] || continue
            f="$d/accounts.txt"
            if [ -f "$f" ]; then
              echo "  + 合并 $f"
              grep -v '^[[:space:]]*$' "$f" >> merged/all_accounts.txt || true
              n=$(grep -cv '^[[:space:]]*$' "$f" 2>/dev/null || echo 0)
              total=$((total + n))
            fi
          done
          # 整体去重（保留顺序）
          if [ -s merged/all_accounts.txt ]; then
            awk '!seen[$0]++' merged/all_accounts.txt > merged/all_accounts_dedup.txt
            mv merged/all_accounts_dedup.txt merged/all_accounts.txt
          fi
          final=$(grep -cv '^[[:space:]]*$' merged/all_accounts.txt 2>/dev/null || echo 0)
          echo "=============================================="
          echo "合并完成：原始 $total 行，去重后 $final 行"
          echo "合并文件：merged/all_accounts.txt"
          echo "--- 前 5 行预览 ---"
          head -n 5 merged/all_accounts.txt || true
          echo "=============================================="

      - name: 读取 CPA 配置
        if: ${{ github.event.inputs.check_alive == 'true' }}
        id: cpa
        shell: bash
        run: |
          if [ -f "gh/ci_config.json" ]; then
            URL=$(python3 -c "import json;print(json.load(open('gh/ci_config.json')).get('cpa_remote_url',''))")
            KEY=$(python3 -c "import json;print(json.load(open('gh/ci_config.json')).get('cpa_management_key',''))")
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "key=$KEY" >> "$GITHUB_OUTPUT"
            echo "CPA 地址: $URL"
          else
            echo "[!] 未找到 gh/ci_config.json"
          fi

      - name: 测活 + 存活上传 CPA
        if: ${{ github.event.inputs.check_alive == 'true' }}
        shell: bash
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          if [ ! -s merged/all_accounts.txt ]; then
            echo "[!] 无账号可测活，跳过"
            exit 0
          fi
          python3 check_alive.py \
            --input merged/all_accounts.txt \
            --workers 3 \
            --tokens-out merged/grok2api_tokens.txt \
            --report merged/verify_report.json \
            --cpa-url "${{ steps.cpa.outputs.url }}" \
            --cpa-key "${{ steps.cpa.outputs.key }}"

      - name: 跳过测活提示
        if: ${{ github.event.inputs.check_alive != 'true' }}
        shell: bash
        run: |
          echo "=============================================="
          echo "已跳过测活（check_alive=false），仅注册+打包"
          echo "=============================================="

      - name: 上传结果包
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: |
            merged/all_accounts.txt
            merged/grok2api_tokens.txt
            merged/verify_report.json
          if-no-files-found: ignore
          retention-days: 14
